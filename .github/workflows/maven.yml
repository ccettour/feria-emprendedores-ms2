name: Java CI with Maven

on:
  push:
    branches: [ "semana-4-integration" ]
  pull_request:
    branches: [ "semana-4-integration" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
        
    - name: Build and Test with Maven
      run: mvn -B test
